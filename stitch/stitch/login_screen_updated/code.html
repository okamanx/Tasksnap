<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login | TaskSnap</title>

                        "background": "#fbf9f6",

                        "on-secondary-container": "#6f4600",
                        "on-primary": "#ffffff",
                        "primary-fixed-dim": "#ffb77f",
                        "tertiary-fixed-dim": "#88d982",

                        "secondary-container": "#feb246",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-effect {
            backdrop-filter: blur(24px);
            background: rgba(255, 255, 255, 0.4);
        }
        .shadow-cloud {
            box-shadow: 0 12px 30px 0 rgba(27, 28, 26, 0.06);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen flex flex-col selection:bg-primary-fixed selection:text-on-primary-fixed">
<main class="flex-grow flex items-center justify-center px-6 py-12 relative overflow-hidden">
<!-- Abstract Decorative Elements (Living Canvas) -->
<div class="absolute top-[-10%] right-[-5%] w-96 h-96 rounded-full bg-primary-container/10 blur-[100px]"></div>
<div class="absolute bottom-[-10%] left-[-5%] w-[500px] h-[500px] rounded-full bg-secondary-container/10 blur-[120px]"></div>
<div class="w-full max-w-md z-10">
<!-- Brand Anchor Header -->
<div class="flex flex-col items-center mb-10">
<div class="mb-6 transform hover:scale-105 transition-transform duration-300">
<img alt="TaskSnap minimalist orange brand logo" class="w-20 h-20 rounded-lg shadow-cloud object-cover" data-alt="A premium minimalist logo for a task application featuring a stylized orange shutter or snap icon on a clean white background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBd-4S9V-WrzqOIcK5po0MO7R5yw2Mz4J0nv8K55CwYb5wb5rzL2IUGNZ9DxeurrvvH4hihILgACQZxmMNKvpZY9XkuSBOsRmZdaxLUJZSAOtuPyxV0cM59Xcv7sY9XNCp9WpoA6880obDAo8MxtGTP3iHmzytUlJH_QRyDaRyS5l4_mWH1sUvY0zMsmoJgbWihb5wncUPAn4xPCfxCvjF-cdMf_Zuo1EgF41VGBdpu8D1W9cv69qicobyUfLN_rJyORlJU6mTCVKk"/>
</div>
<h1 class="font-headline text-4xl font-bold tracking-tighter text-on-surface text-center mb-2">TaskSnap</h1>
<p class="text-on-surface-variant font-medium tracking-tight">Your Local Hustle, Simplified.</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-lg p-8 shadow-cloud border border-white/50 relative overflow-hidden">
<form class="space-y-6">
<!-- Phone Number Input -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant ml-1" for="phone">Phone Number</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">smartphone</span>
</div>
<input class="w-full pl-12 pr-4 py-4 bg-surface-container rounded-md border-none focus:ring-2 focus:ring-primary-container/30 transition-all placeholder:text-outline/60 text-on-surface" id="phone" name="phone" placeholder="Enter your mobile number" type="tel"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-sm font-semibold text-on-surface-variant" for="password">Password</label>
<a class="text-xs font-bold text-primary hover:text-primary-container transition-colors" href="#">Forgot?</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-[20px]">lock</span>
</div>
<input class="w-full pl-12 pr-12 py-4 bg-surface-container rounded-md border-none focus:ring-2 focus:ring-primary-container/30 transition-all placeholder:text-outline/60 text-on-surface" id="password" name="password" placeholder="••••••••" type="password"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center cursor-pointer">
<span class="material-symbols-outlined text-outline/60 text-[20px] hover:text-outline transition-colors">visibility</span>
</div>
</div>
</div>
<!-- CTA Button -->
<div class="pt-2">
<button class="w-full py-4 px-6 rounded-md bg-gradient-to-br from-primary-container to-secondary-container text-white font-headline font-bold text-lg shadow-cloud hover:opacity-90 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group" type="submit">
                            Login
                            <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform">arrow_forward</span>
</button>
</div>
</form>
<!-- Social Login Separator -->
<div class="relative my-8">
<div class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant/30"></div>
</div>
<div class="relative flex justify-center text-xs">
<span class="px-3 bg-surface-container-lowest text-outline italic">secure connection</span>
</div>
</div>
<!-- Registration Link -->
<div class="text-center">
<p class="text-on-surface-variant text-sm font-medium">
                        Don't have an account? 
                        <a class="text-primary font-bold hover:underline decoration-primary/30 underline-offset-4 ml-1" href="#">Register here</a>
</p>
</div>
</div>
<!-- Trust Badges -->
<div class="mt-12 flex justify-center items-center gap-8 opacity-40 grayscale hover:grayscale-0 hover:opacity-80 transition-all duration-500">
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">verified_user</span>
<span class="text-[10px] font-bold tracking-widest uppercase">Encrypted</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">local_police</span>
<span class="text-[10px] font-bold tracking-widest uppercase">Verified</span>
</div>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">public</span>
<span class="text-[10px] font-bold tracking-widest uppercase">Global</span>
</div>
</div>
</div>
</main>
<!-- Contextual Footer Suppression (Login screen) -->
<!-- Shell suppressed for Transactional/Focused intent as per design rules -->
</body></html>
