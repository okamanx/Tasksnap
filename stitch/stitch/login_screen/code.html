<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #fbf9f6;
        }
        h1, h2, h3 {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

            background: linear-gradient(135deg, #ff8a00 0%, #feb246 100%);
        }

            box-shadow: 0 12px 30px 0 rgba(27, 28, 26, 0.06);

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center p-6">
<!-- Login Container -->
<main class="w-full max-w-md flex flex-col items-center space-y-12">
<!-- Branding Section -->
<header class="text-center space-y-6">
<div class="relative inline-block">
<!-- Abstract Logo Shape -->
<div class="w-20 h-20 sunlight-gradient rounded-xl rotate-12 flex items-center justify-center shadow-lg shadow-primary-container/20 overflow-hidden">
<span class="material-symbols-outlined text-white text-4xl -rotate-12" data-icon="bolt" style="font-variation-settings: 'FILL' 1;">bolt</span>
</div>
<!-- Asymmetric Decorative Element -->
<div class="absolute -top-2 -right-2 w-8 h-8 bg-tertiary-container rounded-full flex items-center justify-center border-4 border-surface">
<span class="material-symbols-outlined text-white text-sm" data-icon="check" style="font-variation-settings: 'FILL' 0; font-weight: 700;">check</span>
</div>
</div>
<div class="space-y-2">
<h1 class="text-4xl font-extrabold tracking-tight text-on-surface">TaskSnap</h1>
<p class="text-on-surface-variant font-medium text-lg max-w-[280px] mx-auto leading-snug">
                    Earn instantly by completing nearby tasks
                </p>
</div>
</header>
<!-- Form Section -->
<section class="w-full space-y-8">
<div class="space-y-4">
<!-- Phone Input Field -->
<div class="relative group">
<label class="block text-xs font-bold uppercase tracking-widest text-on-surface-variant mb-2 ml-4" for="phone">Phone Number</label>
<div class="flex items-center bg-surface-container-low rounded-lg p-1 border border-transparent focus-within:border-outline-variant/30 transition-all duration-300">
<div class="flex items-center px-4 space-x-2 border-r border-outline-variant/20">
<img alt="USA Flag" class="w-6 h-4 rounded-sm object-cover" data-alt="close up of a clean american flag icon for a phone country code selector" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAFKWwl2uf6jicVKBedv52pQPh4cq2XRley-l9DZAhoJ4uADz3Ritrdw7sEBJOEN1EnCk8qp1uj5q94kldZ65Qz30VslH6m_E61wuVhWikLr84mJ0bqZZGJNDF8kHDVNFYC0ZpXziKxAqdqmzkMS2HFYy0vxKl9tTcTqPh-7-Fonjz4rELZyv0uVLuTyhh53DlC-Ci5k5NsX4CfjF80wRS4D-jVdhPa5J9EOi-DSP39yA_cKBwtz7L2Bfpet9sRatAHTRe_pGU0C9g"/>
<span class="text-on-surface font-semibold text-sm">+1</span>
</div>
<input class="w-full bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-outline/50 font-medium py-3 px-4" id="phone" placeholder="Enter your mobile number" type="tel"/>
</div>
</div>
<!-- OTP Hint / Helper -->
<p class="text-xs text-on-surface-variant/70 text-center px-4 italic">
                    We'll send a 6-digit verification code to this number.
                </p>
</div>
<!-- Action Button -->
<button class="w-full sunlight-gradient text-on-primary font-bold py-5 rounded-lg cloud-shadow hover:scale-[0.98] active:scale-95 transition-all duration-300 text-lg flex items-center justify-center space-x-2">
<span>Continue</span>
<span class="material-symbols-outlined text-xl" data-icon="arrow_forward">arrow_forward</span>
</button>
</section>
<!-- Visual Anchor / Footer -->

<div class="relative h-64 w-full rounded-lg overflow-hidden group">
<img alt="Local Tasker" class="w-full h-full object-cover grayscale opacity-20 group-hover:grayscale-0 group-hover:opacity-40 transition-all duration-700" data-alt="editorial style photo of a friendly young man helping a neighbor carry groceries in a sunny suburban neighborhood" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAkaCVnzHkyPzN8SToTR1W8qQEn5FuXlPyURyvFJotYPHI2VcC6lq78r2BOuFlHVJGgKW82ZvRcwJ_BSgHCx6a-0Zzv4wX9EZoStQSAPjIinomT8b2Boiz4SJ3e37xFMEJvciGwNsqf_xFkRL5-KT51AeQ9TNNix98WTV_72kaUK4IgdnotkB27Uo5q-Kx99lGt_9Ti1twsQy6hn8Cbo0MbZvM1WWxXfTwfyV3hWvMFcba4QBkLsU5sqI9vIwrxwE6kO7GYejCetRs"/>

</div>
<span class="text-[10px] font-bold uppercase tracking-wider text-on-surface-variant">1,200+ taskers active today</span>

</div>
<div class="mt-8 flex justify-center space-x-6">

</main>
<!-- Background Decoration (Asymmetric & Editorial) -->
<div class="fixed -top-24 -left-24 w-96 h-96 bg-primary-container/5 rounded-full blur-[100px] pointer-events-none -z-10"></div>
