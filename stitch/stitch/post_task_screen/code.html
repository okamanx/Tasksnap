<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Post a Task - TaskSnap</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-surface": "#1b1c1a",
                    "on-tertiary-fixed-variant": "#005312",
                    "surface": "#fbf9f6",
                    "on-tertiary": "#ffffff",
                    "tertiary": "#1b6d24",
                    "on-primary-container": "#613100",
                    "on-secondary-container": "#6f4600",
                    "secondary": "#845400",
                    "outline": "#8a7362",
                    "primary-container": "#ff8a00",
                    "surface-container-highest": "#e4e2df",
                    "on-primary-fixed-variant": "#6f3900",
                    "surface-tint": "#914c00",
                    "outline-variant": "#ddc1ae",
                    "on-secondary-fixed": "#2a1800",
                    "on-tertiary-container": "#00490e",
                    "background": "#fbf9f6",
                    "on-background": "#1b1c1a",
                    "on-secondary-fixed-variant": "#643f00",
                    "secondary-fixed-dim": "#ffb95a",
                    "on-surface-variant": "#564334",
                    "on-primary": "#ffffff",
                    "on-primary-fixed": "#2f1500",
                    "surface-variant": "#e4e2df",
                    "on-tertiary-fixed": "#002204",
                    "on-error-container": "#93000a",
                    "primary-fixed": "#ffdcc4",
                    "secondary-fixed": "#ffddb6",
                    "inverse-on-surface": "#f2f0ed",
                    "on-error": "#ffffff",
                    "surface-dim": "#dbdad7",
                    "error": "#ba1a1a",
                    "surface-container-lowest": "#ffffff",
                    "inverse-surface": "#30312f",
                    "tertiary-container": "#6bbb68",
                    "tertiary-fixed-dim": "#88d982",
                    "surface-container": "#efeeeb",
                    "error-container": "#ffdad6",
                    "primary": "#914c00",
                    "surface-container-high": "#eae8e5",
                    "primary-fixed-dim": "#ffb77f",
                    "inverse-primary": "#ffb77f",
                    "surface-container-low": "#f5f3f0",
                    "on-secondary": "#ffffff",
                    "tertiary-fixed": "#a3f69c",
                    "surface-bright": "#fbf9f6",
                    "secondary-container": "#feb246"
            },
            "borderRadius": {
                    "DEFAULT": "1rem",
                    "lg": "2rem",
                    "xl": "3rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Plus Jakarta Sans"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .cloud-shadow {
            box-shadow: 0 12px 30px 0 rgba(27, 28, 26, 0.06);
        }
        .glass-bezel {
            border: 1px solid rgba(228, 226, 223, 0.4);
        }
        input:focus, textarea:focus {
            outline: none;
            box-shadow: 0 0 0 2px #ff8a0022;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface min-h-screen pb-32">
<!-- TopAppBar -->
<header class="bg-orange-50/80 dark:bg-zinc-950/80 backdrop-blur-xl fixed top-0 w-full z-50">
<div class="flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-3">
<button class="text-orange-600 dark:text-orange-400 hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
</button>
<h1 class="text-xl font-extrabold text-orange-600 dark:text-orange-400 font-['Plus_Jakarta_Sans'] font-bold tracking-tight">TaskSnap</h1>
</div>
<button class="text-orange-600 dark:text-orange-400 hover:opacity-80 transition-opacity scale-95 active:scale-90 transition-transform">
<span class="material-symbols-outlined" data-icon="notifications">notifications</span>
</button>
</div>
</header>
<main class="pt-24 px-6 max-w-2xl mx-auto space-y-8">
<!-- Title Section -->
<div class="flex flex-col gap-1">
<h2 class="text-3xl font-headline font-bold text-on-surface tracking-tight">Post a Task</h2>
<p class="text-on-surface-variant text-sm">Need a hand? Describe what you need and get local help.</p>
</div>
<!-- Upload Image Card -->
<div class="relative group cursor-pointer h-56 w-full rounded-lg bg-surface-container-low flex flex-col items-center justify-center border-2 border-dashed border-outline-variant hover:bg-surface-container-high transition-all">
<div class="flex flex-col items-center gap-3">
<div class="bg-primary-container/10 p-4 rounded-full text-primary">
<span class="material-symbols-outlined text-4xl" data-icon="add_a_photo">add_a_photo</span>
</div>
<span class="font-semibold text-on-surface-variant">Add task photos</span>
<span class="text-xs text-outline">Up to 5 images (JPEG, PNG)</span>
</div>
</div>
<!-- Form Sections -->
<div class="space-y-6">
<!-- Title & Description -->
<div class="bg-surface-container-lowest rounded-lg p-6 cloud-shadow space-y-6">
<div class="space-y-2">
<label class="text-sm font-bold text-on-surface tracking-wide uppercase px-1">Task Title</label>
<input class="w-full bg-surface-container-low border-none rounded-md px-4 py-3 text-on-surface placeholder:text-outline/60 font-medium" placeholder="e.g., Fix wooden garden fence" type="text"/>
</div>
<div class="space-y-2">
<label class="text-sm font-bold text-on-surface tracking-wide uppercase px-1">Description</label>
<textarea class="w-full bg-surface-container-low border-none rounded-md px-4 py-3 text-on-surface placeholder:text-outline/60 font-medium resize-none" placeholder="Describe the task details, tools needed, etc..." rows="4"></textarea>
</div>
</div>
<!-- Price & Logistics Bento -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<div class="bg-surface-container-lowest rounded-lg p-6 cloud-shadow space-y-2">
<label class="text-sm font-bold text-on-surface tracking-wide uppercase px-1">Budget</label>
<div class="relative flex items-center">
<span class="absolute left-4 text-primary font-bold text-lg">₹</span>
<input class="w-full bg-surface-container-low border-none rounded-md pl-10 pr-4 py-3 text-on-surface font-bold text-lg" placeholder="500" type="number"/>
</div>
</div>
<div class="bg-surface-container-lowest rounded-lg p-6 cloud-shadow space-y-2">
<label class="text-sm font-bold text-on-surface tracking-wide uppercase px-1">Duration</label>
<select class="w-full bg-surface-container-low border-none rounded-md px-4 py-3 text-on-surface font-medium appearance-none">
<option>~ 1 Hour</option>
<option selected="">~ 2 Hours</option>
<option>~ 4 Hours</option>
<option>Full Day</option>
</select>
</div>
</div>
<!-- Timing Selector -->
<div class="bg-surface-container-lowest rounded-lg p-6 cloud-shadow space-y-4">
<label class="text-sm font-bold text-on-surface tracking-wide uppercase px-1">Timing</label>
<div class="flex flex-wrap gap-3">
<button class="bg-primary-container text-on-primary-container font-semibold px-5 py-2 rounded-full text-sm">Flexible</button>
<button class="bg-surface-container-low text-on-surface-variant font-semibold px-5 py-2 rounded-full text-sm hover:bg-surface-container-high">Morning</button>
<button class="bg-surface-container-low text-on-surface-variant font-semibold px-5 py-2 rounded-full text-sm hover:bg-surface-container-high">Afternoon</button>
<button class="bg-surface-container-low text-on-surface-variant font-semibold px-5 py-2 rounded-full text-sm hover:bg-surface-container-high">Evening</button>
</div>
</div>
<!-- Location Section -->
<div class="bg-surface-container-lowest rounded-lg p-6 cloud-shadow space-y-4 overflow-hidden relative">
<div class="flex justify-between items-center px-1">
<label class="text-sm font-bold text-on-surface tracking-wide uppercase">Location</label>
<button class="text-primary text-xs font-bold flex items-center gap-1 hover:opacity-80">
<span class="material-symbols-outlined text-sm" data-icon="my_location">my_location</span>
                        Use Current Location
                    </button>
</div>
<div class="space-y-3">
<div class="relative">
<span class="absolute left-4 top-3.5 material-symbols-outlined text-outline" data-icon="location_on">location_on</span>
<input class="w-full bg-surface-container-low border-none rounded-md pl-11 pr-4 py-3 text-on-surface placeholder:text-outline/60 font-medium" placeholder="Enter service address" type="text"/>
</div>
<!-- Small Map Hint -->
<div class="h-32 w-full rounded-md overflow-hidden grayscale brightness-95 opacity-80">
<img class="w-full h-full object-cover" data-alt="stylized minimalistic city map view with soft clean lines and muted neutral tones" data-location="Mumbai" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDY-qmVR6bRIdS5av7dQLm-hEM-o7PNN5s6I3SVOwNAIZbFFO_ZiFY-tU6F32TJHqZXZWZPjbE05tsi9bHjq1rBRMvb9SsZQiLzhkqhDHucdiivwJQN4X8hidthv08-waqJNM8JqVOUmIADuQedh1gUREIBUho7ALZHgJXbSsaC7gMJ-pu_YNptMsyTY0ID797Lxr7rp6W1svDlZUWYlEkDfSUv-hbcHVYcLKF0aIabVsgOM1wIaM7pEWB5cNuPr2sWhW50Jq3kA1E"/>
</div>
</div>
</div>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full py-5 rounded-md bg-gradient-to-br from-orange-500 to-orange-300 text-white font-headline font-extrabold text-lg shadow-lg shadow-orange-500/20 active:scale-95 transition-all flex items-center justify-center gap-2">
                Post Task
                <span class="material-symbols-outlined" data-icon="send">send</span>
</button>
<p class="text-center text-xs text-on-surface-variant mt-4 px-6">By posting, you agree to our Terms of Service and Safety Guidelines.</p>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-6 w-full z-50 flex justify-around items-center px-2">
<div class="bg-white/70 dark:bg-zinc-900/70 backdrop-blur-2xl fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] rounded-[999px] border border-white/20 dark:border-zinc-800/20 shadow-[0_12px_30px_0_rgba(0,0,0,0.06)] flex justify-around items-center px-2 py-2 glass-bezel">
<!-- Home -->
<div class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 p-3 hover:bg-orange-50 dark:hover:bg-zinc-800/50 rounded-full cursor-pointer transition-all">
<span class="material-symbols-outlined" data-icon="home_max">home_max</span>
<span class="text-[11px] font-['Manrope'] font-semibold tracking-wide">Home</span>
</div>
<!-- Task (Active) -->
<div class="flex flex-col items-center justify-center bg-gradient-to-br from-orange-500 to-orange-300 text-white rounded-full p-3 shadow-lg shadow-orange-500/20 scale-98 transition-all duration-300 ease-out cursor-pointer">
<span class="material-symbols-outlined" data-icon="add_circle" style="font-variation-settings: 'FILL' 1;">add_circle</span>
<span class="text-[11px] font-['Manrope'] font-semibold tracking-wide">Task</span>
</div>
<!-- History -->
<div class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 p-3 hover:bg-orange-50 dark:hover:bg-zinc-800/50 rounded-full cursor-pointer transition-all">
<span class="material-symbols-outlined" data-icon="history">history</span>
<span class="text-[11px] font-['Manrope'] font-semibold tracking-wide">History</span>
</div>
<!-- Profile -->
<div class="flex flex-col items-center justify-center text-zinc-400 dark:text-zinc-500 p-3 hover:bg-orange-50 dark:hover:bg-zinc-800/50 rounded-full cursor-pointer transition-all">
<span class="material-symbols-outlined" data-icon="person">person</span>
<span class="text-[11px] font-['Manrope'] font-semibold tracking-wide">Profile</span>
</div>
</div>
</nav>
</body></html>
